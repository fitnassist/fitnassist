name: Weekly Client Reports

on:
  schedule:
    - cron: '0 7 * * 1' # Every Monday at 7:00 UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  send-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger trainer weekly reports
        run: |
          curl -f -X POST \
            "${{ secrets.API_URL }}/api/cron/weekly-reports" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Trigger client weekly reports
        run: |
          curl -f -X POST \
            "${{ secrets.API_URL }}/api/cron/client-weekly-reports" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
