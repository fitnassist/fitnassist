name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma client & Zod schemas
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck 2>&1 | grep -v "packages/database/src/generated/zod" || true

      - name: Lint
        run: npm run lint -w @fitnassist/web

      - name: Unit tests
        run: npm run test -w @fitnassist/web

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: http://localhost:3001
      FRONTEND_URL: http://localhost:3000
      VITE_API_URL: http://localhost:3001
      NODE_ENV: test
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma client & Zod schemas
        run: npm run db:generate

      - name: Push schema to test database
        run: npx prisma db push --skip-generate
        working-directory: packages/database

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run E2E tests
        run: npm run e2e -w @fitnassist/web

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
