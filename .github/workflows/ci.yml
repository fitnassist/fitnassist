name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            api:
              - 'apps/api/**'
              - 'packages/**'
            packages:
              - 'packages/**'

  quality-web:
    name: Quality (Web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=optional

      - name: Generate Prisma client & Zod schemas
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck 2>&1 | grep -v "packages/database/src/generated/zod" || true

      - name: Format check
        run: npm run format:check -w @fitnassist/web

      - name: Lint
        run: npm run lint -w @fitnassist/web

      - name: Unit tests
        run: npm run test -w @fitnassist/web

  quality-api:
    name: Quality (API)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=optional

      - name: Generate Prisma client & Zod schemas
        run: npm run db:generate

      - name: Typecheck API
        run: npm run typecheck -w @fitnassist/api 2>&1 | grep -v "packages/database/src/generated/zod" || true

      - name: Unit tests
        run: npm run test -w @fitnassist/api
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          BETTER_AUTH_SECRET: "ci-test-secret-at-least-32-characters"
          BETTER_AUTH_URL: "http://localhost:3001"
          FRONTEND_URL: "http://localhost:3000"
          NODE_ENV: test

      - name: Verify API starts
        run: |
          npx tsx apps/api/src/server.ts &
          API_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "API started successfully"
              kill $API_PID || true
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start within 15s"
          kill $API_PID || true
          exit 1
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          BETTER_AUTH_SECRET: "ci-test-secret-at-least-32-characters"
          BETTER_AUTH_URL: "http://localhost:3001"
          FRONTEND_URL: "http://localhost:3000"
          NODE_ENV: test

  e2e:
    name: E2E
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=optional

      - name: Generate Prisma client & Zod schemas
        run: npm run db:generate

      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci/pr-${{ github.event.pull_request.number || github.sha }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Push schema to test database
        run: npx prisma db push --skip-generate
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled }}

      - name: Create .env files
        run: |
          echo "DATABASE_URL=${{ steps.neon.outputs.db_url_pooled }}" > apps/api/.env
          echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" >> apps/api/.env
          echo "BETTER_AUTH_URL=http://localhost:3001" >> apps/api/.env
          echo "FRONTEND_URL=http://localhost:3000" >> apps/api/.env
          echo "NODE_ENV=test" >> apps/api/.env
          echo "VITE_API_URL=http://localhost:3001" > apps/web/.env

      - name: Seed test database
        run: |
          npx tsx apps/api/src/server.ts &
          API_PID=$!
          sleep 5
          npm run db:seed
          kill $API_PID || true
          sleep 2
          lsof -ti:3001 | xargs kill -9 2>/dev/null || true
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:3001
          FRONTEND_URL: http://localhost:3000
          NODE_ENV: test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run E2E tests
        run: npm run e2e -w @fitnassist/web
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:3001
          FRONTEND_URL: http://localhost:3000
          VITE_API_URL: http://localhost:3001

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Delete Neon branch
        if: always()
        run: |
          npm i -g neonctl@latest
          neonctl branches delete ${{ steps.neon.outputs.branch_id }} --project-id ${{ vars.NEON_PROJECT_ID }}
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

  ci-gate:
    name: CI Gate
    if: always()
    needs: [changes, quality-web, quality-api, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Web quality: ${{ needs.quality-web.result }}"
          echo "API quality: ${{ needs.quality-api.result }}"
          echo "E2E: ${{ needs.e2e.result }}"

          # Fail if any required job failed (skipped is OK)
          if [[ "${{ needs.quality-web.result }}" == "failure" ]]; then exit 1; fi
          if [[ "${{ needs.quality-api.result }}" == "failure" ]]; then exit 1; fi
          if [[ "${{ needs.e2e.result }}" == "failure" ]]; then exit 1; fi

          echo "All checks passed!"
